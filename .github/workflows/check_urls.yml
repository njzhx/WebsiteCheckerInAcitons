name: 网站连通性检测

on:
  workflow_dispatch:         # 仅允许手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行连通性检测
        run: python check_urls.py
